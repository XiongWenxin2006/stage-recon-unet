# @package _global_
# Single full-reconstruction pretrain, then downstream fine-tune.
# E2E checkpoint is written to stage3_best.pt so downstream load paths match.
defaults:
  - /base
  - /data: synthetic
  - /data_source: local
  - /model: unet
  - _self_

experiment:
  name: end_to_end_pretrain
  type: staged_pipeline
  stages: [e2e_pretrain, downstream]

stages:
  e2e_pretrain:
    name: e2e_full_reconstruction
    forward_mode: reconstruction
    module_initialization:
      encoder: {source: random}
      bottleneck: {source: random}
      decoder: {source: random}
      reconstruction_head: {source: random}
    trainable_modules: [encoder, bottleneck, decoder, reconstruction_head]
    frozen_modules: [segmentation_head, bottleneck_reconstruction_head]
    checkpoint_output: ${paths.stage3_checkpoint}
    loss_name: mse
    data_task: reconstruction
  downstream:
    name: downstream_finetune_full
    forward_mode: segmentation
    module_initialization:
      encoder:
        source: checkpoint
        checkpoint_path: ${paths.stage3_checkpoint}
        source_module: encoder
        strict: true
      bottleneck:
        source: checkpoint
        checkpoint_path: ${paths.stage3_checkpoint}
        source_module: bottleneck
        strict: true
      decoder:
        source: checkpoint
        checkpoint_path: ${paths.stage3_checkpoint}
        source_module: decoder
        strict: true
      segmentation_head: {source: random}
    trainable_modules: [encoder, bottleneck, decoder, segmentation_head]
    frozen_modules: [reconstruction_head, bottleneck_reconstruction_head]
    checkpoint_output: ${paths.checkpoint_dir}/downstream_best.pt
    loss_name: bce_dice
    data_task: segmentation
