# @package _global_
# Tiny CPU smoke pipeline: stage1 → stage2 → stage3 → downstream.
# Run: python scripts/run_experiment.py --config-name experiments/smoke_test
defaults:
  - /base
  - /data: synthetic
  - /data_source: local
  - /model: unet
  - _self_

experiment:
  name: smoke_test
  type: staged_pipeline
  stages: [stage1, stage2, stage3, downstream]

# Override for tiny CPU run
data:
  image_size: 64
  num_samples: 16
  in_channels: 1
  num_classes: 1
  spatial_dims: 2

data_source:
  batch_size: 2
  num_workers: 0

model:
  encoder:
    channels: [16, 32, 64]  # smaller for speed

trainer:
  max_epochs: 1
  steps_per_epoch: 2
  val_steps: 1

# Stage specs inlined so PipelineRunner can read stages.* without complex defaults.
stages:
  stage1:
    name: stage1_encoder_reconstruction
    forward_mode: reconstruction
    module_initialization:
      encoder: {source: random}
      bottleneck: {source: random}
      decoder: {source: random}
      reconstruction_head: {source: random}
    trainable_modules: [encoder, bottleneck, decoder, reconstruction_head]
    frozen_modules: [segmentation_head, bottleneck_reconstruction_head]
    checkpoint_output: ${paths.stage1_checkpoint}
    loss_name: mse
    data_task: reconstruction
  stage2:
    name: stage2_bottleneck_decoder
    forward_mode: reconstruction
    module_initialization:
      encoder: {source: random}
      bottleneck:
        source: checkpoint
        checkpoint_path: ${paths.stage1_checkpoint}
        source_module: bottleneck
        strict: true
      decoder: {source: random}
      reconstruction_head: {source: random}
    trainable_modules: [bottleneck, decoder, reconstruction_head]
    frozen_modules: [encoder, segmentation_head, bottleneck_reconstruction_head]
    checkpoint_output: ${paths.stage2_checkpoint}
    loss_name: mse
    data_task: reconstruction
  stage3:
    name: stage3_full_reconstruction
    forward_mode: reconstruction
    module_initialization:
      encoder:
        source: checkpoint
        checkpoint_path: ${paths.stage1_checkpoint}
        source_module: encoder
        strict: true
      bottleneck:
        source: checkpoint
        checkpoint_path: ${paths.stage2_checkpoint}
        source_module: bottleneck
        strict: true
      decoder:
        source: checkpoint
        checkpoint_path: ${paths.stage2_checkpoint}
        source_module: decoder
        strict: true
      reconstruction_head: {source: random}
    trainable_modules: [encoder, bottleneck, decoder, reconstruction_head]
    frozen_modules: [segmentation_head, bottleneck_reconstruction_head]
    checkpoint_output: ${paths.stage3_checkpoint}
    loss_name: mse
    data_task: reconstruction
  downstream:
    name: downstream_finetune_full
    forward_mode: segmentation
    module_initialization:
      encoder:
        source: checkpoint
        checkpoint_path: ${paths.stage3_checkpoint}
        source_module: encoder
        strict: true
      bottleneck:
        source: checkpoint
        checkpoint_path: ${paths.stage3_checkpoint}
        source_module: bottleneck
        strict: true
      decoder:
        source: checkpoint
        checkpoint_path: ${paths.stage3_checkpoint}
        source_module: decoder
        strict: true
      segmentation_head: {source: random}
    trainable_modules: [encoder, bottleneck, decoder, segmentation_head]
    frozen_modules: [reconstruction_head, bottleneck_reconstruction_head]
    checkpoint_output: ${paths.checkpoint_dir}/downstream_best.pt
    loss_name: bce_dice
    data_task: segmentation
