# 3D ModularUNet — smaller channel ladder for memory.
name: unet_3d
in_channels: ${data.in_channels}
out_channels: ${data.in_channels}
num_classes: ${data.num_classes}
spatial_dims: 3
norm: batch
activation: relu
encoder:
  name: unet
  channels: [16, 32, 64, 128]
bottleneck:
  name: conv
decoder:
  name: unet
heads:
  bottleneck_reconstruction:
    name: bottleneck_reconstruction
  reconstruction:
    name: image_reconstruction
  segmentation:
    name: segmentation
