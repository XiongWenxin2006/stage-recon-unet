# Reusable Stage-1 snippet (encoder + bottleneck focused reconstruction).
# Load with StageSpec.from_config (unwraps the ``stage`` key), or copy fields
# under experiments.*.stages.stage1 (preferred for Hydra composition).
stage:
  name: stage1_encoder_reconstruction
  forward_mode: reconstruction
  module_initialization:
    encoder: {source: random}
    bottleneck: {source: random}
    decoder: {source: random}
    reconstruction_head: {source: random}
  trainable_modules: [encoder, bottleneck, decoder, reconstruction_head]
  frozen_modules: [segmentation_head, bottleneck_reconstruction_head]
  checkpoint_output: ${paths.stage1_checkpoint}
  loss_name: mse
  data_task: reconstruction
