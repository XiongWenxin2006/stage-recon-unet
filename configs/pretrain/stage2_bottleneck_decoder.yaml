# Reusable Stage-2 snippet: bottleneck from stage1; encoder/decoder/recon head random.
# Trainable: bottleneck, decoder, reconstruction_head. Encoder frozen.
# Prefer inlining under experiments.*.stages.stage2 for Hydra composition.
stage:
  name: stage2_bottleneck_decoder
  forward_mode: reconstruction
  module_initialization:
    encoder: {source: random}
    bottleneck:
      source: checkpoint
      checkpoint_path: ${paths.stage1_checkpoint}
      source_module: bottleneck
      strict: true
    decoder: {source: random}
    reconstruction_head: {source: random}
  trainable_modules: [bottleneck, decoder, reconstruction_head]
  frozen_modules: [encoder, segmentation_head, bottleneck_reconstruction_head]
  checkpoint_output: ${paths.stage2_checkpoint}
  loss_name: mse
  data_task: reconstruction
